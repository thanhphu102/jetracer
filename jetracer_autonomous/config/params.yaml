ros:
  camera_topic: "/camera/image_raw"
  command_topic: "/cmd_vel"
  loop_rate_hz: 15
  use_twist_cmd: true

vehicle:
  backend: "twist_http"  # twist, direct_jetracer, http_jetracer, twist_http, both
  http_url: "http://127.0.0.1:8766/drive"
  http_timeout_sec: 1.0
  steering_gain: 1.0
  steering_offset: 0.0
  throttle_gain: 1.0
  throttle_offset: 0.0

model:
  backend: "http"   # local or http
  path: "models/best.pt"
  conf_threshold: 0.35
  inference_every_n_frames: 3
  http_url: "http://127.0.0.1:8765/detect"
  http_timeout_sec: 3.0
  jpeg_quality: 65
  device: "0"       # 0 for GPU, cpu for CPU
  imgsz: 416
  half: false

sign:
  pending_timeout_sec: 12.0
  roi_y_min_fraction: 0.00
  roi_y_max_fraction: 0.50
  prohibited_enabled: false
  enabled_signs:
    - "0_Go_straight"
    - "1_Turn_left"
    - "2_Turn_right"
  class_thresholds:
    0_Go_straight: 0.35
    1_Turn_left: 0.35
    2_Turn_right: 0.35
    3_Prohibited: 0.80

line:
  use_cuda: true
  threshold_mode: "white_on_dark"
  kp: 0.004
  max_steering: 0.60
  lost_timeout_sec: 1.50
  threshold_value: 150
  min_pixels: 60
  min_contour_area: 80
  require_bottom_contact: true
  bottom_band_fraction: 0.20
  bottom_score_threshold: 0.015

  roi_y_start_fraction: 0.42
  roi_y_end_fraction: 0.95
  debug_show_roi: true

intersection:
  side_score_threshold: 0.15
  center_score_threshold: 0.10
  horizontal_score_threshold: 0.30
  cross_stable_frames: 3
  use_peak_row_score: true
  band_y_start_fraction: 0.38
  band_y_end_fraction: 0.78
  side_margin_fraction: 0.03
  max_line_error_for_cross: 160

throttle:
  normal: 0.25
  slow: 0.25
  turn: 0.25
  stop: 0.0

steering:
  straight: 0.0
  avoid_left: 0.45
  avoid_right: -0.45
  turn_left: 0.70
  turn_right: -0.70

control:
  steering_smoothing_alpha: 0.65
  max_steering_delta_per_step: 0.10

perception:
  sign_stable_frames: 2
  light_stable_frames: 2
  avoid_stable_frames: 2

turn:
  approach_time_sec: 0.25
  min_turn_time_sec: 0.50
  max_turn_time_sec: 2.50
  recover_time_sec: 0.60
  go_straight_time_sec: 0.60
  cooldown_sec: 1.50

avoid:
  duration_sec: 0.50

debug:
  dry_run: false
  show_log: true
  log_raw_yolo: true
  publish_overlay: true
  publish_line_mask: true
  publish_debug_every_n_frames: 3

  save_overlay_frames: false
  overlay_save_interval: 30
  overlay_save_path: "/tmp/jetracer_debug/"
